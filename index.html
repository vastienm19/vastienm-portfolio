<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Cormorant+Garamond:italic,wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --c-grey: #1a1a1a;
            --c-white: #ffffff;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
            --f-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--c-black);
            color: var(--c-white);
            font-family: var(--f-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #0a0a0a 100%);
        }

        /* --- Header / Logo --- */
        .header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .logo-container img {
            max-width: 280px;
            height: auto;
            margin-bottom: 1rem;
        }

        .tagline {
            font-family: var(--f-body);
            font-style: italic;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
        }

        /* --- Portfolio Grid --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 4rem;
        }

        .work-item {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--c-grey);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .work-item:hover {
            transform: scale(1.02);
            border-color: var(--c-yellow);
        }

        .work-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .work-item:hover img { opacity: 0.9; }

        .work-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: var(--f-title);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* --- Links / Buttons --- */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--c-white);
            font-family: var(--f-title);
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .link-btn:hover {
            background-color: var(--c-yellow);
            color: var(--c-black);
            border-color: var(--c-yellow);
        }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            padding-top: 5rem;
            text-align: center;
        }

        .timecode {
            font-family: var(--f-mono);
            color: var(--c-yellow);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .location { font-size: 0.6rem; letter-spacing: 3px; color: #444; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <h1 style="font-family: var(--f-title); font-size: 3rem; color: var(--c-yellow);">VASTIENM</h1>
        </div>
        <div class="tagline">Visual Storyteller</div>
    </header>

    <div class="portfolio-grid">
        <div class="work-item">
            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=800&q=80" alt="Cinematography">
            <div class="work-info">Cinematography</div>
        </div>
        <div class="work-item">
            <img src="https://images.unsplash.com/photo-1506947411487-a56738267384?auto=format&fit=crop&w=800&q=80" alt="Aerial Drone">
            <div class="work-info">Aerial Perspective</div>
        </div>
    </div>

    <div class="links-container">
        <a href="https://www.instagram.com/vastienm" target="_blank" class="link-btn">Instagram</a>
        <a href="https://wa.me/?text=Hola%20Vastienm" target="_blank" class="link-btn">WhatsApp</a>
    </div>

    <footer>
        <div class="timecode" id="timecode">00:00:00:00</div>
        <div class="location">BUENOS AIRES • 2026</div>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const f = String(Math.floor(now.getMilliseconds() / 40)).padStart(2, '0');
            document.getElementById('timecode').textContent = `${h}:${m}:${s}:${f}`;
        }
        setInterval(updateTime, 40);
        updateTime();
    </script>
</body>
</html>
