<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--c-black); color: white; font-family: var(--f-body); overflow-x: hidden; }

        /* --- LOGO DISEÑADO (Exacto a tu imagen) --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container { text-align: center; transition: all 0.7s ease; }

        .logo-main {
            font-family: var(--f-title);
            font-size: 4.5rem; /* Tamaño de impacto */
            font-weight: 800;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -5px; /* CLAVE: Letras pegadas como tu logo */
            line-height: 0.75;
            display: block;
        }

        .logo-sub {
            font-family: var(--f-body);
            font-size: 1.5rem;
            font-style: italic;
            color: #ffffff;
            display: block;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* LOGO CUANDO SCROLLEAS (Se va a la esquina) */
        header.scrolled {
            height: 90px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            justify-content: flex-start;
            padding-left: 40px;
        }
        header.scrolled .logo-main { font-size: 1.8rem; letter-spacing: -1.5px; }
        header.scrolled .logo-sub { font-size: 0.8rem; margin-top: 2px; }

        /* --- MENÚ LATERAL --- */
        .menu-btn {
            position: fixed;
            top: 35px; right: 40px;
            z-index: 1100;
            font-family: var(--f-title);
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--c-yellow);
            cursor: pointer;
            border-bottom: 1px solid var(--c-yellow);
        }

        /* --- SECCIONES CON MARCO (Estilo Pomelli) --- */
        section {
            height: 100vh;
            padding: 100px 40px 40px 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            position: relative;
