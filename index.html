<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--c-black); color: white; font-family: var(--f-body); }

        /* --- Header Mejorado --- */
        header {
            padding: 1.5rem 1rem; /* Más compacto */
            text-align: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            /* Degradado más sutil para no tapar tanto */
            background: linear-gradient(to bottom, rgba(10,10,10,0.8) 0%, rgba(10,10,10,0) 100%);
            backdrop-filter: blur(5px); /* Efecto de vidrio para que no choque visualmente */
        }

        .logo-main {
            font-family: var(--f-title);
            font-size: 1.8rem; /* Tamaño reducido para no invadir */
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            display: block;
        }
        .logo-sub {
            font-family: var(--f-body);
            font-size: 0.9rem;
            font-style: italic;
            display: block;
            margin-top: 2px;
            opacity: 0.8;
        }

        section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4; /* Bajé un poco la opacidad para que el texto resalte más */
        }

        .content { 
            position: relative; 
            z-index: 2; 
            text-align: center; 
            padding-top: 60px; /* Espacio extra para que el header no pise el título inicial */
        }
