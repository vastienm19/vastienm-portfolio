<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }

        /* HEADER FIJO PERO CHICO */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 1.5rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
        }

        .bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .txt {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h2 {
            font-size: 3.5rem;
            text-transform: uppercase;
            color: #FFD700;
            margin-bottom: 0.5rem;
        }

        p { font-size: 1.2rem; font-style: italic; color: #ccc; }

        .btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            border: 2px solid #FFD700;
            color: #FFD700;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }

        footer { padding: 2rem; text-align: center; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">VASTIENM</div>
    </header>

    <section>
        <img src="filmmaker.jpg" class="bg">
        <div class="txt">
            <h2>Filmmaker</h2>
            <p>Capturando la esencia</p>
        </div>
    </section>

    <section>
        <img src="edicion .png" class="bg">
        <div class="txt">
            <h2>Edición</h2>
            <p>Narrativa con ritmo</p>
        </div>
    </section>

    <section>
        <img src="drone.jpg" class="bg">
        <div class="txt">
            <h2>Drone</h2>
            <p>Nuevas perspectivas</p>
            <a href="https://wa.me/?text=Hola%20Vastienm" class="btn">Contacto</a>
        </div>
    </section>

    <footer>BUENOS AIRES • 2026</footer>

</body>
</html>
