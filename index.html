<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background-color: var(--c-black); color: white; font-family: var(--f-body); overflow-x: hidden; }

        header {
            padding: 3rem 1rem;
            text-align: center;
            position: fixed;
            width: 100%;
            z-index: 100; /* Asegura que esté arriba de todo */
            background: linear-gradient(to bottom, rgba(10,10,10,0.9), rgba(10,10,10,0));
        }

        /* --- LOGO ESCRITO (Adiós al cuadrado negro) --- */
        .brand {
            text-decoration: none;
            display: inline-block;
        }
        .logo-main {
            font-family: var(--f-title);
            font-size: 2.2rem;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
            display: block;
        }
        .logo-sub {
            font-family: var(--f-body);
            font-size: 1rem;
            font-style: italic;
            color: white;
            display: block;
            margin-top: 2px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.45;
        }

        .content { position: relative; z-index: 2; text-align: center; }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(3rem, 12vw, 5rem);
            text-transform: uppercase;
            color: var(--c-yellow);
            line-height: 0.85;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .content p { font-size: 1.5rem; font-style: italic; margin-top: 10px; }

        .contact-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1.2rem 2.5rem;
            border: 2px solid var(--c-yellow);
            color: var(--c-yellow);
            text-decoration: none;
            font-family: var(--f-title);
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.3s;
            background: rgba(0,0,0,0.4);
        }

        .contact-btn:hover { background: var(--c-yellow); color: black; }

        footer { padding: 2rem; text-align: center; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <span class="logo-main">VASTIENM</span>
            <span class="logo-sub">visual storyteller</span>
