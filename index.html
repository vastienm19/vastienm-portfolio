<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Cormorant+Garamond:italic,wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --c-grey: #1a1a1a;
            --c-white: #ffffff;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
            --f-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--c-black);
            color: var(--c-white);
            font-family: var(--f-body);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 1rem;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #0a0a0a 100%);
        }

        .header { text-align: center; margin-bottom: 4rem; }

        .logo-container h1 {
            font-family: var(--f-title);
            font-size: 3.5rem;
            color: var(--c-yellow);
            letter-spacing: -2px;
        }

        .tagline {
            font-style: italic;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.7);
            letter-spacing: 2px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 4rem;
        }

        .work-item {
            position: relative;
            aspect-ratio: 16 / 9;
            background: var(--c-grey);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s ease;
        }

        .work-item img {
            width: 100%; height: 100%; object-fit: cover; opacity: 0.6;
        }

        .work-info {
            position: absolute; bottom: 20px; left: 20px;
            font-family: var(--f-title); text-transform: uppercase; font-size: 0.9rem;
        }

        .links-container {
            width: 100%; max-width: 400px;
            display: flex; flex-direction: column; gap: 1rem;
        }

        .link-btn {
            text-decoration: none; padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--c-white); font-family: var(--f-title);
            font-weight: 800; text-transform: uppercase; text-align: center;
            transition: 0.3s;
        }

        .link-btn:hover {
            background-color: var(--c-yellow); color: var(--c-black);
        }

        footer { margin-top: auto; padding-top: 5rem; text-align: center; }

        .timecode {
            font-family: var(--f-mono); color: var(--c-yellow);
            font-size: 0.8rem; margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <h1>VASTIENM</h1>
        </div>
        <div class="tagline">Visual Storyteller</div>
    </header>

    <div class="portfolio-grid">
        <div class="work-item">
            <img src="filmaker.jpg" alt="Filmmaker">
            <div class="work-info">Cinematography</div>
        </div>
        <div class="work-item">
            <img src="drone.jpg" alt="Drone">
            <div class="work-info">Aerial Perspective</div>
        </div>
    </div>

    <div class="links-container">
        <a href="https://www.instagram.com/vastienm" class="link-btn">Instagram</a>
        <a href="https://wa.me/?text=Hola" class="link-btn">WhatsApp</a>
    </div>

    <footer>
        <div class="timecode" id="timecode">00:00:00:00</div>
        <div class="location">BUENOS AIRES • 2026</div>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const f = String(Math.floor(now.getMilliseconds() / 40)).padStart(2, '0');
            document.getElementById('timecode').textContent = `${h}:${m}:${s}:${f}`;
        }
        setInterval(updateTime, 40);
        updateTime();
    </script>
</body>
</html>
