<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--c-black); color: white; font-family: var(--f-body); }

        /* --- HEADER EN LA ESQUINA (Para que no tape nada) --- */
        header {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            text-align: left;
        }

        .logo-main {
            font-family: var(--f-title);
            font-size: 1.4rem;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }
        .logo-sub {
            font-family: var(--f-body);
            font-size: 0.8rem;
            font-style: italic;
            display: block;
            opacity: 0.7;
        }

        section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .content { 
            position: relative; 
            z-index: 2; 
            text-align: center; 
        }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(3rem, 15vw, 6rem);
            text-transform: uppercase;
            color: var(--c-yellow);
            line-height: 0.8;
            margin-bottom: 10px;
        }

        p { font-size: 1.6rem; font-style: italic; }

        .contact-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            border: 1px solid var(--c-yellow);
            color: var(--c-yellow);
            text-decoration: none;
            font-family: var(--f-title);
            text-transform: uppercase;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
        }

        footer { padding: 2rem; text-align: center; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">
            <span class="logo-main">VASTIENM</span>
            <span class="logo-sub">visual storyteller</span>
        </div>
    </header>

    <section>
        <img src="filmmaker.jpg" class="bg-img">
        <div class="content">
            <h2>Filmmaker</h2>
            <p>Capturando la esencia</p>
        </div>
    </section>

    <section>
        <img src="edicion .png" class="bg-img" onerror="this.src='edicion.png'">
        <div class="content">
            <h2>Edición</h2>
            <p>Narrativa con ritmo</p>
        </div>
    </section>

    <section>
        <img src="drone.jpg" class="bg-img">
        <div class="content">
            <h2>Drone</h2>
            <p>Nuevas perspectivas</p>
            <a href="https://wa.me/?text=Hola%20Vastienm" class="contact-btn">Solicitar Presupuesto</a>
        </div>
    </section>

    <footer>BUENOS AIRES • 2026</footer>

</body>
</html>
