<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        
        body { 
            background-color: var(--c-black); 
            color: white; 
            font-family: var(--f-body); 
            overflow-x: hidden;
        }

        /* --- LOGO DISEÑADO (Efecto exacto al original) --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-container { text-align: center; transition: 0.6s; }
        
        .logo-main {
            font-family: var(--f-title);
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -4px; /* Letras compactas como tu logo */
            line-height: 0.75;
            display: block;
        }
        
        .logo-sub {
            font-family: var(--f-body);
            font-size: 1.2rem;
            font-style: italic;
            color: #fff;
            display: block;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Estado Scroll */
        header.scrolled {
            height: 70px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(10px);
            justify-content: flex-start;
            padding-left: 30px;
        }
        header.scrolled .logo-main { font-size: 1.4rem; letter-spacing: -1px; }
        header.scrolled .logo-sub { font-size: 0.7rem; margin-top: 1px; }

        /* --- MENÚ LATERAL --- */
        .menu-trigger {
            position: fixed;
            top: 30px; right: 30px;
            z-index: 1100;
            font-family: var(--f-title);
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--c-yellow);
            cursor: pointer;
            border-bottom: 1px solid var(--c-yellow);
        }

        #side-menu {
            position: fixed;
            top: 0; right: -100%;
            width: 300px; height: 100%;
            background: #111;
            z-index: 2000;
            padding: 80px 40px;
            transition: 0.4s ease-in-out;
            border-left: 1px solid var(--c-yellow);
        }

        #side-menu.open { right: 0; }

        .menu-links { list-style: none; margin-top: 40px; }
        .menu-links li { margin-bottom: 25px; }
        .menu-links a {
            color: white;
            text-decoration: none;
            font-family: var(--f-title);
            font-size: 1.5rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .menu-links a:hover { color: var(--c-yellow); }

        /* --- SECCIONES (Refinado Pomelli) --- */
        section {
            height: 100vh;
            padding: 100px 30px 30px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .border-frame {
            position: relative;
            width: 100%; height: 100%;
            border: 1px solid rgba(255, 215, 0, 0.15); /* El borde sutil que pediste */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background-color: #151515; /* Fallback si la imagen no carga */
        }

        .bg-img {
            position: absolute;
            width: calc(100% - 20px);
            height: calc(100% - 20px);
            object-fit: cover;
            opacity: 0.4;
            transition: 1s ease;
        }

        .content { position: relative; z-index: 10; text-align: center; }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(2rem, 8vw, 3.5rem); /* Achicamos los títulos */
            text-transform: uppercase;
            color: var(--c-yellow);
            line-height: 0.9;
        }

        p { font-size: 1.5rem; font-style: italic; margin-top: 10px; opacity: 0.8; }

        footer { 
            padding: 50px; 
            text-align: center; 
            font-size: 0.75rem; 
            letter-spacing: 3px; 
            opacity: 0.5;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="menu-trigger" onclick="toggleMenu()">MENU</div>

    <nav id="side-menu">
        <div style="text-align:right; cursor:pointer; color:var(--c-yellow); font-family:var(--f-title); font-size:0.7rem;" onclick="toggleMenu()">CERRAR</div>
        <ul class="menu-links">
            <li><a href="#filmmaker" onclick="toggleMenu()">Filmmaker</a></li>
            <li><a href="#edicion" onclick="toggleMenu()">Edición</a></li>
            <li><a href="#drone" onclick="toggleMenu()">Drone</a></li>
            <li><a href="#about" onclick="toggleMenu()">About Me</a></li>
            <li><a href="https://wa.me/?text=Hola%20Vastienm" target="_blank">Contacto</a></li>
        </ul>
    </nav>

    <header id="nav">
        <div class="logo-container">
            <span class="logo-main">VASTIENM</span>
            <span class="logo-sub">visual storyteller</span>
        </div>
    </header>

    <section id="filmmaker">
        <div class="border-frame">
            <img src="filmmaker.jpg" class="bg-img" alt="">
            <div class="content">
                <h2>Filmmaker</h2>
                <p>Capturando la esencia</p>
            </div>
        </div>
    </section>

    <section id="edicion">
        <div class="border-frame">
            <img src="edicion.png" class="bg-img" alt="">
            <div class="content">
                <h2>Edición</h2>
                <p>Narrativa con ritmo</p>
            </div>
        </div>
    </section>

    <section id="drone">
        <div class="border-frame">
            <img src="drone.jpg" class="bg-img" alt="">
            <div class="content">
                <h2>Drone</h2>
                <p>Nuevas perspectivas</p>
            </div>
        </div>
    </section>

    <footer>
        Norberto de la Riestra • Argentina
    </footer>

    <script>
        // Efecto scroll para el logo
        window.addEventListener('scroll', function() {
            const nav = document.getElementById('nav');
            if (window.scrollY > 60) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // Abrir/Cerrar menú
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('open');
        }
    </script>
</body>
</html>
