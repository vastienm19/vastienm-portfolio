<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background-color: var(--c-black); color: white; font-family: var(--f-body); overflow-x: hidden; }

        header {
            padding: 3.5rem 1rem;
            text-align: center;
            position: fixed;
            width: 100%;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(10,10,10,0.95), rgba(10,10,10,0));
        }

        /* --- LOGO DISEÑADO CON CÓDIGO --- */
        .brand { text-decoration: none; }
        
        .logo-main {
            font-family: var(--f-title);
            font-size: 2.5rem; /* Más grande */
            font-weight: 800;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -2px; /* Letras más juntas como en tu logo */
            line-height: 0.8;
            display: block;
        }
        
        .logo-sub {
            font-family: var(--f-body);
            font-size: 1.2rem;
            font-style: italic;
            color: #ddd;
            display: block;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.45;
        }

        .content { position: relative; z-index: 2; text-align: center; }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(3rem, 12vw, 5.5rem);
            text-transform: uppercase;
            color: var(--c-yellow);
            letter-spacing: -2px;
            line-height: 0.85;
        }

        .content p { font-size: 1.6rem; font-style: italic; margin-top: 10px; color: #eee; }

        .contact-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1.2rem 2.5rem;
            border: 2px solid var(--c-yellow);
            color: var(--c-yellow);
            text-decoration: none;
            font-family: var(--f-title);
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.9rem;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
        }

        .contact-btn:hover { background: var(--c-yellow); color: black; }

        footer { padding: 2rem; text-align: center; font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <span class="logo-main">VASTIENM</span>
            <span class="logo-sub">visual storyteller</span>
        </div>
    </header>

    <section>
        <img src="filmmaker.jpg" class="bg-img">
        <div class="content">
            <h2>Filmmaker</h2>
            <p>Capturando la esencia</p>
        </div>
    </section>

    <section>
        <img src="edicion.png" class="bg-img" alt="Edición">
        <div class="content">
            <h2>Edición</h2>
            <p>Narrativa con ritmo</p>
        </div>
    </section>

    <section>
        <img src="drone.jpg" class="bg-img">
        <div class="content">
            <h2>Drone</h2>
            <p>Nuevas perspectivas</p>
            <a href="https://wa.me/?text=Hola%20Vastienm" class="contact-btn">Solicitar Presupuesto</a>
        </div>
    </section>

    <footer>BUENOS AIRES • 2026</footer>

</body>
</html>
