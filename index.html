<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--c-black); color: white; font-family: var(--f-body); overflow-x: hidden; }

        /* --- LOGO ANIMADO (Scroll) --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-container { text-align: center; transition: all 0.5s; }
        .logo-main {
            font-family: var(--f-title);
            font-size: 3rem;
            color: var(--c-yellow);
            text-transform: uppercase;
            letter-spacing: -2px;
            line-height: 0.8;
        }
        .logo-sub {
            font-family: var(--f-body);
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.8;
        }

        /* Clase que se activa al scrollear (vía JS abajo) */
        header.scrolled {
            height: 80px;
            justify-content: flex-start;
            padding-left: 30px;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(10px);
        }
        header.scrolled .logo-main { font-size: 1.5rem; letter-spacing: -1px; }
        header.scrolled .logo-sub { font-size: 0.7rem; }

        /* --- MENÚ LATERAL --- */
        .menu-trigger {
            position: fixed;
            top: 35px; right: 30px;
            z-index: 1100;
            cursor: pointer;
            font-family: var(--f-title);
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--c-yellow);
            text-transform: uppercase;
        }

        /* --- SECCIONES (Estilo Pomelli) --- */
        section {
            height: 100vh;
            padding: 10vh 5vw; /* Margen para que respire */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.15); /* Borde fino elegante */
            padding: 15px; /* Separación interna */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-img {
            position: absolute;
            top: 15px; left: 15px;
            width: calc(100% - 30px);
            height: calc(100% - 30px);
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(30%);
            transition: 0.8s;
        }

        section:hover .bg-img { opacity: 0.6; filter: grayscale(0%); }

        .content { position: relative; z-index: 10; text-align: center; }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(3.5rem, 15vw, 7rem);
            text-transform: uppercase;
            color: var(--c-yellow);
            line-height: 0.8;
            margin-bottom: 15px;
        }

        p { font-size: 2rem; font-style: italic; color: white; }

        .btn {
            display: inline-block;
            margin-top: 3rem;
            padding: 1rem 2.5rem;
            border: 1px solid var(--c-yellow);
            color: var(--c-yellow);
            text-decoration: none;
            font-family: var(--f-title);
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        footer { padding: 4rem; text-align: center; font-size: 0.7rem; opacity: 0.4; letter-spacing: 4px; }
    </style>
</head>
<body>

    <div class="menu-trigger">MENU</div>

    <header id="main-header">
        <div class="logo-container">
            <span class="logo-main">VASTIENM</span>
            <span class="logo-sub">visual storyteller</span>
        </div>
    </header>

    <section id="filmmaker">
        <div class="image-wrapper">
            <img src="filmmaker.jpg" class="bg-img">
            <div class="content">
                <h2>Filmmaker</h2>
                <p>Capturando la esencia</p>
            </div>
        </div>
    </section>

    <section id="edicion">
        <div class="image-wrapper">
            <img src="edicion.png" class="bg-img" onerror="this.src='edicion .png'">
            <div class="content">
                <h2>Edición</h2>
                <p>Narrativa con ritmo</p>
            </div>
        </div>
    </section>

    <section id="drone">
        <div class="image-wrapper">
            <img src="drone.jpg" class="bg-img">
            <div class="content">
                <h2>Drone</h2>
                <p>Nuevas perspectivas</p>
                <a href="https://wa.me/?text=Hola%20Vastienm" class="btn">Presupuesto</a>
            </div>
        </div>
    </section>

    <footer>BUENOS AIRES • 2026</footer>

    <script>
        // Lógica para mover el logo al scrollear
        window.onscroll = function() {
            const header = document.getElementById("main-header");
            if (window.pageYOffset > 50) {
                header.classList.add("scrolled");
            } else {
                header.classList.remove("scrolled");
            }
        };
    </script>

</body>
</html>
