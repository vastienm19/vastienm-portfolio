<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASTIENM | Visual Storyteller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Cormorant+Garamond:italic,wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #0a0a0a;
            --f-title: 'Syne', sans-serif;
            --f-body: 'Cormorant Garamond', serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--c-black);
            color: white;
            font-family: var(--f-body);
        }

        /* --- Header con Logo --- */
        header {
            padding: 1.5rem;
            text-align: center;
            background: linear-gradient(to bottom, rgba(10,10,10,1), rgba(10,10,10,0));
            position: fixed;
            width: 100%;
            z-index: 10;
        }

        .logo-img {
            max-width: 180px; /* Ajustá el tamaño de tu logo acá */
            height: auto;
        }

        /* --- Secciones Verticales --- */
        section {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .bg-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4; /* Oscurece un poco más para que el logo y textos resalten */
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 0 1rem;
        }

        h2 {
            font-family: var(--f-title);
            font-size: clamp(2.5rem, 10vw, 4rem); /* Tamaño fluido para mobile */
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 0.5rem;
            color: var(--c-yellow);
        }

        p {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-style: italic;
            opacity: 0.9;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            border: 1px solid var(--c-yellow);
            color: var(--c-yellow);
            text-decoration: none;
            font-family: var(--f-title);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: var(--c-yellow);
            color: black;
        }

        footer {
            padding: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="VASTIENM" class="logo-img">
    </header>

    <section>
        <img src="filmmaker.jpg" class="bg-img" alt="Filmmaking">
        <div class="content">
            <h2>Filmmaker</h2>
            <p>Capturando la esencia</p>
        </div>
    </section>

    <section>
        <img src="edicion.png" class="bg-img" alt="Edición">
        <div class="content">
            <h2>Edición</h2>
            <p>Narrativa con ritmo</p>
        </div>
    </section>

    <section>
        <img src="drone.jpg" class="bg-img" alt="Drone">
        <div class="content">
            <h2>Drone</h2>
            <p>Nuevas perspectivas</p>
            <a href="https://wa.me/?text=Hola%20Vastienm" class="contact-btn">Solicitar Presupuesto</a>
        </div>
    </section>

    <footer>
        BUENOS AIRES • 2026
    </footer>

</body>
</html>
