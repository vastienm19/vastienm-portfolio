<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vastienm | Calculadora Profesional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #121212;
            --c-grey: #2B2B2B;
            --c-input-bg: #1A1A1A;
            --c-white: #e0e0e0;
            --f-title: 'Oswald', sans-serif;
            --f-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--c-black);
            color: var(--c-white);
            font-family: var(--f-mono);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* SCREEN INTERFACE */
        .workspace {
            width: 100%;
            max-width: 1000px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .brand {
            font-family: var(--f-title);
            font-size: 2rem;
            color: #fff;
            letter-spacing: 1px;
        }

        input,
        select {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 15px;
            font-family: var(--f-mono);
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: var(--c-yellow);
        }

        .project-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: var(--c-yellow);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .items-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 80px 40px;
            gap: 10px;
            margin-bottom: 10px;
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .item-row {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 80px 40px;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .row-total-display {
            text-align: right;
            color: #666;
            font-size: 0.9rem;
        }

        .btn-icon {
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .btn-icon:hover {
            color: #f44;
        }

        .add-btn {
            background: transparent;
            border: 1px dashed #444;
            color: var(--c-yellow);
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-family: var(--f-mono);
            margin-top: 10px;
            transition: 0.2s;
        }

        .add-btn:hover {
            background: rgba(255, 215, 0, 0.05);
            border-color: var(--c-yellow);
        }

        .addons-wrapper {
            margin-top: 30px;
            padding: 20px;
            background: #111;
            border: 1px solid #333;
        }

        .addon-row {
            display: grid;
            grid-template-columns: 30px 1fr 150px;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .text-right {
            text-align: right;
        }

        .footer-tools {
            margin-top: 40px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
        }

        .display-total {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--c-yellow);
        }

        .btn-print {
            padding: 12px 24px;
            background: var(--c-yellow);
            color: #000;
            border: none;
            font-family: var(--f-title);
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .btn-print:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .print-layout {
            display: none;
        }

        /* PRINT INTERFACE */
        @media print {
            body {
                background: #fff !important;
                color: #000 !important;
                display: block;
                padding: 0;
                margin: 0;
            }

            .workspace {
                display: none !important;
            }

            .print-layout {
                display: flex !important;
                flex-direction: column;
                width: 100%;
                min-height: 100vh;
                padding: 50px;
                box-sizing: border-box;
            }

            .print-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                border-bottom: 2px solid #000;
                padding-bottom: 20px;
                margin-bottom: 40px;
            }

            .p-logo {
                font-family: 'Oswald';
                font-size: 3rem;
                color: #000;
                font-weight: 700;
                line-height: 1;
            }

            .p-sub {
                font-family: 'JetBrains Mono';
                font-size: 0.8rem;
                letter-spacing: 3px;
                color: #555;
                margin-top: 5px;
                text-transform: uppercase;
            }

            .p-client {
                margin-bottom: 40px;
            }

            .p-project {
                font-size: 1.5rem;
                font-family: 'Oswald';
                margin-bottom: 5px;
                text-transform: uppercase;
            }

            .p-name {
                font-family: 'JetBrains Mono';
                color: #333;
                font-size: 1rem;
            }

            .p-table {
                width: 100%;
                border-collapse: collapse;
                margin-bottom: 40px;
            }

            .p-table th {
                text-align: left;
                border-bottom: 1px solid #000;
                padding: 10px 0;
                font-size: 0.8rem;
                text-transform: uppercase;
                color: #555;
            }

            .p-table td {
                padding: 15px 0;
                border-bottom: 1px solid #eee;
                font-family: 'Oswald';
                font-size: 1rem;
                color: #000;
                letter-spacing: 0.5px;
            }

            .p-footer {
                margin-top: auto;
                display: flex;
                justify-content: flex-end;
                border-top: 2px solid #000;
                padding-top: 20px;
            }

            .p-total-block {
                text-align: right;
            }

            .p-label {
                font-size: 0.9rem;
                text-transform: uppercase;
                color: #666;
                margin-bottom: 5px;
                letter-spacing: 1px;
            }

            .p-amount {
                font-family: 'JetBrains Mono';
                font-size: 2rem;
                font-weight: 700;
                color: #000;
            }
        }
    </style>
</head>

<body>

    <div class="workspace">
        <header>
            <div class="brand">Vastienm.</div>
            <div>
                <select id="currency" onchange="calculate()">
                    <option value="USD">U$S (Dólar)</option>
                    <option value="ARS">$ (Peso)</option>
                </select>
            </div>
        </header>

        <div class="project-meta">
            <div class="form-group">
                <label>Proyecto</label>
                <input type="text" id="in-project" placeholder="Nombre del Proyecto..." onkeyup="syncPrint()">
            </div>
            <div class="form-group">
                <label>Cliente</label>
                <input type="text" id="in-client" placeholder="Nombre del Cliente..." onkeyup="syncPrint()">
            </div>
        </div>

        <div class="form-group">
            <label>Ítems</label>
            <div class="items-header">
                <div>Descripción</div>
                <div>Horas</div>
                <div>Precio/Hr</div>
                <div style="text-align:right">Sub</div>
                <div></div>
            </div>
            <div id="item-list"></div>
            <button class="add-btn" onclick="addItem()">+ Nuevo Ítem</button>
        </div>

        <div class="addons-wrapper">
            <label style="margin-bottom:15px; display:block;">Adicionales Fijos</label>

            <div class="addon-row">
                <input type="checkbox" id="chk-color" onclick="calculate()">
                <span>Color Grading</span>
                <input type="number" id="val-color" class="text-right" value="200" onkeyup="calculate()">
            </div>

            <div class="addon-row">
                <input type="checkbox" id="chk-subs" onclick="calculate()">
                <span>Subtítulos</span>
                <input type="number" id="val-subs" class="text-right" value="80" onkeyup="calculate()">
            </div>

            <div class="addon-row">
                <input type="checkbox" id="chk-adapt" onclick="calculate()">
                <span>Adaptación H/V</span>
                <input type="number" id="val-adapt" class="text-right" value="120" onkeyup="calculate()">
            </div>
        </div>

        <div class="footer-tools">
            <div style="text-align:right">
                <div style="font-size:0.8rem; color:#666; text-transform:uppercase;">Total Estimado</div>
                <div class="display-total" id="screen-total">0.00</div>
            </div>
            <button class="btn-print" onclick="window.print()">Imprimir PDF 🖨️</button>
        </div>
    </div>

    <!-- CLIENTE: PDF LAYOUT -->
    <div class="print-layout">
        <div class="print-header">
            <div>
                <div class="p-logo">Vastienm.</div>
                <div class="p-sub">Video Editor & Storyteller</div>
            </div>
            <div style="text-align:right; font-size:0.8rem; color:#555;">
                <div id="p-date">DATE</div>
            </div>
        </div>

        <div class="p-client">
            <div class="p-project" id="out-project">PROYECTO</div>
            <div class="p-name" id="out-client">CLIENTE</div>
        </div>

        <table class="p-table">
            <thead>
                <tr>
                    <th>Descripción del Servicio</th>
                </tr>
            </thead>
            <tbody id="out-list"></tbody>
        </table>

        <div class="p-footer">
            <div class="p-total-block">
                <div class="p-label">Total Final</div>
                <div class="p-amount" id="out-total">0.00</div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('p-date').innerText = new Date().toLocaleDateString();
        addItem();

        function addItem() {
            const container = document.getElementById('item-list');
            const id = 'row-' + Date.now();
            const div = document.createElement('div');
            div.className = 'item-row';
            div.id = id;
            div.innerHTML = `
                <input type="text" class="i-desc" placeholder="Descripción de Tarea" onkeyup="syncPrint()">
                <input type="number" class="i-hours" value="1" placeholder="Hs" onkeyup="calculate()">
                <input type="number" class="i-rate" value="50" placeholder="$" onkeyup="calculate()">
                <div class="row-total-display">0</div>
                <button class="btn-icon" onclick="removeRow('${id}')">×</button>
            `;
            container.appendChild(div);
            calculate();
        }

        function removeRow(id) {
            document.getElementById(id).remove();
            calculate();
            syncPrint();
        }

        function formatVal(num) {
            const currency = document.getElementById('currency').value;
            const prefix = currency === 'USD' ? 'U$S ' : '$ ';
            return prefix + num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function calculate() {
            let total = 0;
            const rows = document.querySelectorAll('.item-row');
            rows.forEach(row => {
                const h = parseFloat(row.querySelector('.i-hours').value) || 0;
                const r = parseFloat(row.querySelector('.i-rate').value) || 0;
                const sub = h * r;
                row.querySelector('.row-total-display').innerText = sub;
                total += sub;
            });

            const addons = [
                { chk: 'chk-color', val: 'val-color' },
                { chk: 'chk-subs', val: 'val-subs' },
                { chk: 'chk-adapt', val: 'val-adapt' }
            ];
            addons.forEach(a => {
                if (document.getElementById(a.chk).checked) {
                    total += parseFloat(document.getElementById(a.val).value) || 0;
                }
            });

            const txt = formatVal(total);
            document.getElementById('screen-total').innerText = txt;
            document.getElementById('out-total').innerText = txt;

            syncPrint();
        }

        function syncPrint() {
            document.getElementById('out-project').innerText = document.getElementById('in-project').value || 'PROYECTO';
            document.getElementById('out-client').innerText = document.getElementById('in-client').value || '';
            const tbody = document.getElementById('out-list');
            tbody.innerHTML = '';
            const rows = document.querySelectorAll('.item-row');
            rows.forEach(row => {
                const desc = row.querySelector('.i-desc').value;
                if (desc.trim()) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${desc}</td>`;
                    tbody.appendChild(tr);
                }
            });
            const addons = [
                { chk: 'chk-color', label: 'Color Grading' },
                { chk: 'chk-subs', label: 'Subtitulado' },
                { chk: 'chk-adapt', label: 'Adaptación de Formatos' }
            ];
            addons.forEach(a => {
                if (document.getElementById(a.chk).checked) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${a.label}</td>`;
                    tbody.appendChild(tr);
                }
            });
        }
    </script>
</body>

</html>
