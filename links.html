<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vastienm | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --c-yellow: #FFD700;
            --c-black: #121212;
            --c-grey: #2B2B2B;
            --c-white: #F5F5F5;
            --c-blue: #00A3FF;
            --f-title: 'Oswald', sans-serif;
            --f-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--c-black);
            color: var(--c-white);
            font-family: var(--f-mono);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #121212 80%);
            position: relative;
        }

        /* --- Safe Area / Overlays --- */
        .safe-area-corner {
            position: fixed;
            width: 20px;
            height: 20px;
            border-color: var(--c-white);
            border-style: solid;
            border-width: 0;
            opacity: 0.2;
            pointer-events: none;
        }

        .tl {
            top: 10px;
            left: 10px;
            border-top-width: 1px;
            border-left-width: 1px;
        }

        .tr {
            top: 10px;
            right: 10px;
            border-top-width: 1px;
            border-right-width: 1px;
        }

        .bl {
            bottom: 10px;
            left: 10px;
            border-bottom-width: 1px;
            border-left-width: 1px;
        }

        .br {
            bottom: 10px;
            right: 10px;
            border-bottom-width: 1px;
            border-right-width: 1px;
        }

        /* --- Profile --- */
        .profile-container {
            margin-bottom: 2.5rem;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            background-color: var(--c-grey);
            border-radius: 50%;
            border: 2px solid var(--c-yellow);
            margin: 0 auto 1rem auto;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-pic::after {
            content: 'Vm';
            font-family: var(--f-title);
            font-size: 2.5rem;
            color: var(--c-black);
            font-weight: bold;
            background: var(--c-yellow);
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-family: var(--f-title);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.2rem;
        }

        .role {
            font-size: 0.8rem;
            color: var(--c-blue);
            letter-spacing: 0.1em;
        }

        /* --- Buttons --- */
        .links-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--c-white);
            font-family: var(--f-mono);
            font-weight: bold;
            /* Bold text as requested */
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            background: rgba(0, 0, 0, 0.3);
            font-size: 0.9rem;
        }

        .link-btn:hover {
            background-color: var(--c-yellow);
            border-color: var(--c-yellow);
            color: var(--c-black);
            transform: scale(1.02);
        }

        /* Specific Button Styles */
        .link-portfolio {
            border-color: var(--c-yellow);
            color: var(--c-yellow);
        }

        .link-portfolio:hover {
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .link-calc {
            border-style: dashed;
            opacity: 0.7;
            font-size: 0.8rem;
        }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            padding-top: 3rem;
            font-size: 0.7rem;
            color: #555;
            width: 100%;
        }

        .real-time {
            font-family: var(--f-mono);
            color: var(--c-yellow);
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="safe-area-corner tl"></div>
    <div class="safe-area-corner tr"></div>
    <div class="safe-area-corner bl"></div>
    <div class="safe-area-corner br"></div>

    <div class="profile-container">
        <div class="profile-pic"></div>
        <h1>Vastienm</h1>
        <div class="role">Visual Storyteller</div>
    </div>

    <div class="links-container">
        <!-- 1. Portfolio -->
        <a href="index.html" class="link-btn link-portfolio">
            Portafolio Profesional
        </a>

        <!-- 2. Instagram -->
        <a href="https://www.instagram.com/vastienm" target="_blank" class="link-btn">
            Instagram
        </a>

        <!-- 3. WhatsApp (Presupuesto) -->
        <!-- Using generic wa.me link with text. -->
        <a href="https://wa.me/?text=Hola%20Vastienm,%20vi%20tu%20trabajo%20y%20quiero%20consultarte%20por%20un%20video"
            target="_blank" class="link-btn">
            Solicitar Presupuesto
        </a>


    </div>

    <footer>
        <div class="real-time" id="timecode">00:00:00:00</div>
        <div>BUENOS AIRES • 2026</div>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const f = String(Math.floor(now.getMilliseconds() / 40)).padStart(2, '0');
            document.getElementById('timecode').textContent = `${h}:${m}:${s}:${f}`;
        }
        setInterval(updateTime, 40);
        updateTime();
    </script>
</body>

</html>
